<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Today Launch</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
        }

        /* The Background Image */
        .bg-container {
            background-image: url('e_mag_laun.jpeg'); /* Ensure this file is in the same folder */
            height: 100vh;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Positions button toward the bottom */
            padding-bottom: 80px;  /* Adjusts the height of the button from the bottom */
        }

        /* The Launch Button Style */
        .launch-button {
            background-color: transparent;
            color: #ffffff;
            border: 3px solid #39FF14; /* Neon Green Border */
            padding: 15px 45px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.4);
            letter-spacing: 2px;
        }

        /* Hover Effect */
        .launch-button:hover {
            background-color: #39FF14;
            color: #000;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.8);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="bg-container">
        <a href="https://online.fliphtml5.com/zhboa/wcgw/" class="launch-button">
            Launch
        </a>
    </div>

</body>
</html>
